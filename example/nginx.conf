server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Verification API → backend
    location /api/ {
        proxy_pass http://127.0.0.1:3456;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
